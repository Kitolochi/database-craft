; ═══════════════════════════════════════════════════════════
; PgBouncer Configuration
;
; PgBouncer sits between your app and Postgres, multiplexing
; many app connections onto fewer Postgres connections.
;
; Typical result: 72% reduction in transaction time for
; high-concurrency workloads.
;
; Place this file at: /etc/pgbouncer/pgbouncer.ini
; ═══════════════════════════════════════════════════════════

[databases]
; Format: dbname = host=HOST port=PORT dbname=DBNAME
mydb = host=127.0.0.1 port=5432 dbname=mydb

; Connection string style:
; mydb = postgresql://user:pass@localhost:5432/mydb

[pgbouncer]

; ─── Listen Settings ──────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

; ─── Authentication ───────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
; Format of userlist.txt: "username" "md5hash_or_password"

; ─── Pool Mode ────────────────────────────────────────────
; transaction: Best for most apps. Connection returned to pool
;              after each transaction. Cannot use session features
;              (SET, prepared statements, LISTEN/NOTIFY).
;
; session:     Connection held for entire client session.
;              Supports all features but fewer multiplexing benefits.
;
; statement:   Connection returned after each statement.
;              Most aggressive. Only works with autocommit.
pool_mode = transaction

; ─── Pool Sizing ──────────────────────────────────────────
; default_pool_size: Connections per user/database pair
; Guideline: Set to your Postgres max_connections / number_of_databases
default_pool_size = 20

; min_pool_size: Keep this many connections open even when idle
; Avoids cold-start latency when traffic resumes
min_pool_size = 5

; reserve_pool_size: Extra connections for burst traffic
; Only used when all regular connections are busy
reserve_pool_size = 5
reserve_pool_timeout = 3

; max_client_conn: Maximum client connections PgBouncer will accept
; This can be much higher than Postgres max_connections
max_client_conn = 1000

; max_db_connections: Hard cap on connections to a single database
; Safety valve — prevents one database from consuming all connections
max_db_connections = 50

; ─── Timeouts ─────────────────────────────────────────────
; server_idle_timeout: Close idle server connections after this
server_idle_timeout = 600

; client_idle_timeout: Close idle client connections after this
; Helps clean up abandoned connections from crashed apps
client_idle_timeout = 300

; server_connect_timeout: Max time to establish connection to Postgres
server_connect_timeout = 5

; query_timeout: Kill queries running longer than this (0 = disabled)
query_timeout = 30

; query_wait_timeout: Max time a client waits for a server connection
; If pool is exhausted, client gets an error after this timeout
query_wait_timeout = 120

; ─── Connection Lifetime ──────────────────────────────────
; server_lifetime: Recycle server connections after this period
; Handles DNS changes, Postgres restarts, connection staleness
server_lifetime = 3600

; ─── Logging ──────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Log slow queries (> 1 second)
log_stats = 1
stats_period = 60

; ─── Admin Console ────────────────────────────────────────
; Connect: psql -p 6432 pgbouncer
; Commands: SHOW POOLS; SHOW STATS; SHOW SERVERS; SHOW CLIENTS;
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

; ─── DNS ──────────────────────────────────────────────────
; dns_max_ttl: Re-resolve DNS after this period
; Important for cloud databases that may change IP
dns_max_ttl = 60

; ─── TLS ──────────────────────────────────────────────────
; Uncomment for production:
; client_tls_sslmode = require
; client_tls_key_file = /etc/pgbouncer/server.key
; client_tls_cert_file = /etc/pgbouncer/server.crt
; server_tls_sslmode = verify-full
; server_tls_ca_file = /etc/pgbouncer/root.crt
